<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    .location {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Register</h2>

  <form id="form">

    <!-- District -->
    <label>Select District</label>
    <select name="district" id="district" required>
      <option value="">-- Select District --</option>

      <!-- Kozhikode group -->
      <option>Kasargod</option>
      <option>Kannur</option>
      <option>Wayanad</option>
      <option>Nilgiri</option>
      <option>Kozhikode North</option>
      <option>Kozhikode South</option>
      <option>Malappuram West</option>
      <option>Malappuram East</option>
      <option>Palakkad</option>

      <!-- Ernakulam group -->
      <option>Thrissur</option>
      <option>Ernakulam</option>
      <option>Alappuzha</option>
      <option>Kottayam</option>
      <option>Idukki LR</option>
      <option>Idukki HR</option>
      <option>Pathanamthitta</option>
      <option>Kollam</option>
      <option>Thiruvananthapuram</option>
    </select>

    <!-- Location Display -->
    <div id="locationText" class="location"></div>

    <!-- Phone -->
    <label>Phone Number</label>
    <input type="tel" name="phone" required pattern="[0-9]{10}" placeholder="Enter 10 digit number">

    <!-- Samiti -->
    <label>Samiti</label>
    <select name="samiti" required>
      <option value="">-- Select --</option>
      <option>District Secretary</option>
      <option>District Convenor</option>
      <option>Division Secretary</option>
      <option>Division Convenor</option>
    </select>

    <button type="submit">Submit</button>

  </form>
</div>

<script>
const kozhikodeDistricts = [
  "Kasargod","Kannur","Wayanad","Nilgiri",
  "Kozhikode North","Kozhikode South",
  "Malappuram West","Malappuram East","Palakkad"
];

const districtSelect = document.getElementById("district");
const locationText = document.getElementById("locationText");

districtSelect.addEventListener("change", () => {
  const district = districtSelect.value;

  if (kozhikodeDistricts.includes(district)) {
    locationText.innerText = "📍 Location: Samastha Centre";
  } else if (district !== "") {
    locationText.innerText = "📍 Location: Students Centre";
  } else {
    locationText.innerText = "";
  }
});

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  // Category + location logic
  if (kozhikodeDistricts.includes(data.district)) {
    data.category = "Kozhikode";
    data.location = "Samastha Centre";
  } else {
    data.category = "Ernakulam";
    data.location = "Students Centre";
  }

  try {
    await fetch("https://script.google.com/macros/s/AKfycby1fR2Wju0zrlnNXxwjLmffyQQmdkXSuhxhsRMqrap_upeXHz2newzyAXi_trEF8X9K/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    });

    alert("✅ Submitted successfully");
    document.getElementById("form").reset();
    locationText.innerText = "";

  } catch (err) {
    alert("❌ Submission failed");
    console.error(err);
  }
});
</script>

</body>
</html>
